bundle:
  name: zerovector-crew
  version: 0.3.0
  description: >
    Full Zero-Vector Design crew: 5 agents, 6 domain-tuned modes,
    fidelity convergence orchestration, and the universal fidelity layer.
    Includes the extractable fidelity behavior transitively.

includes:
  - bundle: zerovector:behaviors/fidelity

hooks:
  - module: hooks-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/hooks-mode
  - module: hooks-fidelity-reporter
    source: ../modules/hooks-fidelity-reporter

tools:
  - module: tool-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/tool-mode
    config:
      gate_policy: "warn"
  - module: tool-fidelity-state
    source: ../modules/tool-fidelity-state
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-module-tool-skills@main
    config:
      skills:
        - "@zerovector:skills"

agents:
  include:
    - zerovector:intent-analyst
    - zerovector:architect
    - zerovector:builder
    - zerovector:shipper

context:
  include:
    - zerovector:context/using-zerovector.md
    - zerovector:context/crew-routing.md
    - modes:context/modes-instructions.md
