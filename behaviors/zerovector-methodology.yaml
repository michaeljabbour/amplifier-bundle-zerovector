bundle:
  name: zerovector-methodology-behavior
  version: 0.2.0
  description: |
    Zero-Vector Design methodology — intent-to-artifact pipeline with a five-role crew,
    domain-tuned slash commands, and a composable four-recipe pipeline.

    Provides 5 agents:
    - intent-analyst: Decodes intent, surfaces constraints, defines success criteria
    - architect: Translates intent into structure, spec, and implementation plan
    - builder: Implements the artifact; structured output contract for review loop integration
    - critic: Two-pass validation (spec compliance + quality); VERDICT line for machine parsing
    - shipper: Executes finish action (merge/pr/keep/discard); produces delivery report

    Provides 6 interactive modes (all with tool policy + anti-rationalization):
    - crew: General intent-to-artifact (any domain)
    - crew-build: Feature/app/tool/script construction
    - crew-product: UX, flows, specs, validation, product strategy
    - crew-platform: Infrastructure, modules, APIs, architecture
    - crew-research: Papers, analysis, investigation, synthesis
    - crew-content: Writing, documentation, curriculum, posts

    Provides 4 composable recipes (v0.2):
    - intent-to-artifact: Master orchestrator — full pipeline (3 approval gates)
    - decode-intent:      Standalone — intent capture + spec (1 approval gate)
    - build-and-review:   Standalone — spec + build + critic convergence loop (max 3 rounds)
    - verify-artifact:    Standalone — evidence-first verification (1 approval gate)
    - finish-artifact:    Standalone — finish action (merge/pr/keep/discard)

    v0.2 pipeline architecture:
    - Convergence loop: builder↔critic iterate up to 3 rounds before surfacing unresolved issues
    - Two-pass critic: Pass 1 = spec/intent compliance; Pass 2 = quality/robustness
    - Machine-parseable VERDICT: PASS|CONDITIONAL_PASS|FAIL for recipe loop integration
    - Four finish actions: merge / pr / keep / discard (safe fallback to keep if action unavailable)
    - State-machine handoff protocol with 3 explicit approval gates
    - Domain tuning: build / product / platform / research / content crew calibration

    Core principles (Zero-Vector Design):
    - Intent → Artifact directly (no lossy translation chain)
    - Agents as crew, not assistants (each has a precise role and quality bar)
    - Work in the medium (build the thing, not a picture of the thing)
    - Boundaryless by nature (disciplinary walls are optional)
    - Compound leverage (each pipeline stage amplifies the last)

    Compose onto your bundle for Zero-Vector workflows.

# Explicit dependency on the modes behavior for namespace resolution
includes:
  - bundle: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=behaviors/modes.yaml

# Mode hook to discover zerovector modes (crew, crew-build, crew-product, crew-platform, crew-research, crew-content)
hooks:
  - module: hooks-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/hooks-mode
    config:
      search_paths:
        - "@zerovector:modes"

# Mode tool for programmatic mode transitions
tools:
  - module: tool-mode
    source: git+https://github.com/microsoft/amplifier-bundle-modes@main#subdirectory=modules/tool-mode
    config:
      gate_policy: "warn"

agents:
  include:
    - zerovector:intent-analyst
    - zerovector:architect
    - zerovector:builder
    - zerovector:critic
    - zerovector:shipper

context:
  include:
    - zerovector:context/zerovector-principles.md
    - zerovector:context/crew-instructions.md
    - zerovector:context/domain-tuning.md
    - modes:context/modes-instructions.md
