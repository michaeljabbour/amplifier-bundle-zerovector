bundle:
  name: fidelity-behavior
  version: 0.3.0
  description: >
    Universal fidelity diagnostic capability for any Amplifier session.
    Provides five-lens fidelity scoring, a live ANSI dashboard, and
    the update_fidelity tool. Compose onto any bundle for continuous
    fidelity monitoring.

hooks:
  - module: hooks-fidelity-reporter
    source: ../modules/hooks-fidelity-reporter

tools:
  - module: tool-fidelity-state
    source: ../modules/tool-fidelity-state

agents:
  include:
    - zerovector:critic
