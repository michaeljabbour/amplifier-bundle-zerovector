# Zero-Vector Intent-to-Artifact — Master Orchestrator (v0.3)
# Fidelity convergence wrapper: decode intent → converge to target fidelity → deliver
#
# v0.3 replaces the linear 4-stage pipeline (decode → build → verify → finish)
# with a 3-stage fidelity convergence wrapper:
#   Stage 1: decode-intent       — intent capture + spec (same as v0.2)
#   Stage 2: fidelity-converge   — multi-lens while-loop drives all 5 fidelity lenses
#   Stage 3: finish-artifact     — execute delivery action (merge / pr / keep)
#
# Approval Gates (2):
#   1. After decode  — approve intent + spec before fidelity convergence begins
#   2. After converge — review convergence result, choose finish action
#
# Sub-recipes (run independently):
#   zerovector:recipes/decode-intent.yaml       — intent capture + spec only
#   zerovector:recipes/fidelity-convergence.yaml — core convergence engine
#   zerovector:recipes/finish-artifact.yaml      — finish action (merge/pr/keep/discard)
#
# Usage (full pipeline):
#   amplifier run "execute zerovector:recipes/intent-to-artifact.yaml
#                  with intent='my intent' domain='build'"
#
# Domains: build | product | platform | research | content | general

name: "intent-to-artifact"
description: "Zero-Vector master pipeline v0.3: fidelity convergence wrapper — state intent once, converge to target fidelity, deliver"
version: "0.3.0"
author: "Zero-Vector Bundle"
tags: ["workflow", "zero-vector", "intent-to-artifact", "orchestrator", "fidelity", "convergence", "v0.3"]

context:
  intent: ""              # Required: the raw human intent
  domain: "general"       # Optional: build | product | platform | research | content | general
  project_path: "."       # Project directory (defaults to current)
  target_fidelity: "0.85" # Convergence threshold (0.0–1.0); loop exits when reached
  fidelity_score: "0"     # Current overall fidelity score; updated each loop iteration
  _approval_message: ""   # Populated by engine when user approves with a message

stages:
  # ==========================================================================
  # STAGE 1: DECODE INTENT
  # Analyst decodes intent → Architect produces spec → human approves before convergence
  # Standalone equivalent: zerovector:recipes/decode-intent.yaml
  # ==========================================================================
  - name: "decode-intent"
    steps:
      - id: "ensure-dirs"
        type: "bash"
        command: |
          mkdir -p "{{project_path}}/docs/plans"
          SLUG=$(echo "{{intent}}" | tr ' ' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-40 | sed 's/-*$//')
          DATE=$(date +%Y-%m-%d)
          echo "{\"intent_path\": \"docs/plans/${DATE}-${SLUG}-intent.md\", \"spec_path\": \"docs/plans/${DATE}-${SLUG}-spec.md\", \"slug\": \"${SLUG}\"}"
        parse_json: true
        output: "paths"

      - id: "decode-intent"
        agent: "zerovector:intent-analyst"
        prompt: |
          Decode this intent and produce a complete Intent Document.

          Raw Intent: {{intent}}
          Domain: {{domain}}
          Project path: {{project_path}}

          Produce a structured Intent Document covering:
          - The Job (one sentence: what is this artifact hired to do?)
          - Outcome Definition (measurable success — what does "done" look like?)
          - Scope (IN: what is included / OUT: what is explicitly excluded)
          - Constraints (tech, time, existing systems, non-negotiables)
          - Assumptions Made (state each assumption and why you made it)
          - Anti-Goals (what this is NOT — restate clearly for the Builder)
          - Risk Flags (what could go wrong if intent is misunderstood?)

          Survey the project at {{project_path}} before producing the document.
          Do not ask questions — make the best interpretation and document it.
        output: "intent_document"

      - id: "save-intent"
        type: "bash"
        command: |
          cat > "{{project_path}}/{{paths.intent_path}}" << 'INTENT_EOF'
          {{intent_document}}
          INTENT_EOF
          echo "Saved: {{paths.intent_path}}"
        output: "intent_save_result"

      - id: "produce-spec"
        agent: "zerovector:architect"
        prompt: |
          Produce a Specification Document from this Intent Document.

          Intent Document:
          {{intent_document}}

          Domain: {{domain}}
          Project path: {{project_path}}

          Include:
          - What We're Building (one paragraph: artifact, purpose, boundaries)
          - Structure (files/components with exact paths and types)
          - Public Interface (signatures, API, section map — domain-appropriate)
          - Implementation Tasks (ordered list, each task has: What / Files / Acceptance Criteria)
          - Integration Points (what this connects to and contracts to preserve)
          - Error Handling / Edge Cases
          - Success Criteria (measurable, maps to Intent Document Outcome)
          - What This Is NOT (anti-goals restated as Builder guardrails)

          Survey {{project_path}} for existing conventions before specifying.
          Every task must have explicit acceptance criteria — Builder must never wonder "is this done?"
        output: "specification"

      - id: "save-spec"
        type: "bash"
        command: |
          cat > "{{project_path}}/{{paths.spec_path}}" << 'SPEC_EOF'
          {{specification}}
          SPEC_EOF
          echo "Saved: {{paths.spec_path}}"
        output: "spec_save_result"

      - id: "decode-summary"
        agent: "zerovector:architect"
        prompt: |
          Produce a concise approval summary for this specification (10 lines max).

          Specification:
          {{specification}}

          Provide:
          1. What artifact will be built (one sentence)
          2. Key design decisions (3–5 bullets)
          3. Number of build tasks
          4. Estimated complexity: simple / medium / complex
          5. Any risks or open questions

          End with: "Ready for fidelity convergence."
        output: "decode_summary"

    # APPROVAL GATE 1: Human reviews intent + spec before fidelity convergence
    approval:
      required: true
      prompt: |
        ## GATE 1 — Approve Intent + Spec Before Fidelity Convergence

        {{decode_summary}}

        ---
        Intent doc: {{paths.intent_path}}
        Spec doc:   {{paths.spec_path}}

        Review the Intent Document and Specification above. APPROVE to proceed to fidelity convergence, or DENY to stop.

  # ==========================================================================
  # STAGE 2: FIDELITY CONVERGE
  # Multi-lens while-loop assesses 5 fidelity lenses and routes to the weakest
  # until overall fidelity >= target_fidelity or max iterations reached
  # Standalone equivalent: zerovector:recipes/fidelity-convergence.yaml
  # ==========================================================================
  - name: "fidelity-converge"
    steps:
      - id: "load-approved-spec"
        type: "bash"
        command: |
          cat "{{project_path}}/{{paths.spec_path}}"
        output: "approved_spec"

      - id: "initial-assessment"
        agent: "zerovector:critic"
        prompt: |
          Perform a multi-lens fidelity assessment of the current state.

          Assess each of the 5 fidelity lenses on a 0.0–1.0 scale:

          1. intent_clarity   — Is the intent fully decoded, unambiguous, and actionable?
          2. specification    — Does a complete, implementation-ready spec exist?
          3. implementation   — Does working, tested code/artifact exist that meets the spec?
          4. quality          — Does the artifact meet quality, robustness, and edge-case standards?
          5. ship_readiness   — Is the artifact ready to ship (docs, tests, clean history, deployment)?

          For each lens, provide:
            - score: 0.0–1.0
            - gap: one-sentence description of what is missing (or "none" if score >= 0.85)
            - priority: true if this is the weakest lens (exactly one lens gets priority: true)

          Intent Document:
          {{intent_document}}

          Specification:
          {{approved_spec}}

          Domain: {{domain}}
          Project path: {{project_path}}

          Respond ONLY with valid JSON matching this schema:
          {
            "intent_clarity":  {"score": 0.0, "gap": "...", "priority": false},
            "specification":   {"score": 0.0, "gap": "...", "priority": false},
            "implementation":  {"score": 0.0, "gap": "...", "priority": false},
            "quality":         {"score": 0.0, "gap": "...", "priority": false},
            "ship_readiness":  {"score": 0.0, "gap": "...", "priority": false},
            "overall":         0.0,
            "priority_gap":    "lens_name"
          }
        parse_json: true
        output: "assessment"

      - id: "extract-score"
        type: "bash"
        command: |
          SCORE=$(echo '{{assessment}}' | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('overall', 0))
          " 2>/dev/null || echo "0")
          echo "{\"fidelity_score\": \"$SCORE\"}"
        parse_json: true
        output: "score_result"

      - id: "convergence-loop"
        while_condition: "{{fidelity_score}} < {{target_fidelity}}"
        max_while_iterations: 8
        update_context:
          fidelity_score: "{{assessment.overall}}"
        while_steps:
          # -----------------------------------------------------------------------
          # Route to the weakest lens agent and close the gap
          # -----------------------------------------------------------------------
          - id: "route-to-gap"
            agent: "self"
            prompt: |
              The multi-lens fidelity assessment identified the following priority gap:

              Priority gap lens: {{assessment.priority_gap}}
              Current fidelity score: {{fidelity_score}} / {{target_fidelity}} target

              Full assessment:
              {{assessment}}

              Intent Document:
              {{intent_document}}

              Specification:
              {{approved_spec}}

              Domain: {{domain}}
              Project path: {{project_path}}

              Delegate to the agent responsible for closing the priority gap lens:
                - intent_clarity  → zerovector:intent-analyst  (refine the Intent Document)
                - specification   → zerovector:architect       (produce or refine the Specification)
                - implementation  → zerovector:builder         (implement or fix the artifact)
                - quality         → zerovector:critic          (run quality pass and address issues)
                - ship_readiness  → zerovector:shipper         (prepare artifact for delivery)

              Instruct the chosen agent to address the gap described in the assessment
              and return the updated artifact or document.
            output: "gap_closure_result"
            on_error: "continue"

          # -----------------------------------------------------------------------
          # Re-assess all 5 lenses after gap closure
          # -----------------------------------------------------------------------
          - id: "re-assess"
            agent: "zerovector:critic"
            prompt: |
              Re-assess all 5 fidelity lenses after the gap closure action.

              Previous assessment:
              {{assessment}}

              Gap closure result:
              {{gap_closure_result}}

              Intent Document:
              {{intent_document}}

              Specification:
              {{approved_spec}}

              Domain: {{domain}}
              Project path: {{project_path}}

              Assess each lens on a 0.0–1.0 scale.
              Respond ONLY with valid JSON matching this schema:
              {
                "intent_clarity":  {"score": 0.0, "gap": "...", "priority": false},
                "specification":   {"score": 0.0, "gap": "...", "priority": false},
                "implementation":  {"score": 0.0, "gap": "...", "priority": false},
                "quality":         {"score": 0.0, "gap": "...", "priority": false},
                "ship_readiness":  {"score": 0.0, "gap": "...", "priority": false},
                "overall":         0.0,
                "priority_gap":    "lens_name"
              }
            parse_json: true
            output: "assessment"

      - id: "converge-summary"
        type: "bash"
        command: |
          echo "============================================"
          echo "  ZERO-VECTOR FIDELITY CONVERGENCE RESULT"
          echo "============================================"
          echo ""
          echo "Intent:          {{intent}}"
          echo "Domain:          {{domain}}"
          echo "Target fidelity: {{target_fidelity}}"
          echo "Final score:     {{fidelity_score}}"
          echo ""
          echo "Lens scores (final assessment):"
          echo "  intent_clarity:  {{assessment.intent_clarity.score}}"
          echo "  specification:   {{assessment.specification.score}}"
          echo "  implementation:  {{assessment.implementation.score}}"
          echo "  quality:         {{assessment.quality.score}}"
          echo "  ship_readiness:  {{assessment.ship_readiness.score}}"
          echo ""
          if [ "$(echo "{{fidelity_score}} >= {{target_fidelity}}" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
            echo "STATUS: CONVERGED — target fidelity reached"
          else
            echo "STATUS: LOOP EXHAUSTED — manual review required (score: {{fidelity_score}})"
          fi
          echo ""
          echo "Intent:  {{paths.intent_path}}"
          echo "Spec:    {{paths.spec_path}}"
          echo "============================================"
        output: "convergence_report"

    # APPROVAL GATE 2: Human reviews convergence result, chooses finish action
    approval:
      required: true
      prompt: |
        ## GATE 2 — Fidelity Convergence Complete

        {{convergence_report}}

        ---
        Fidelity convergence complete. Score: {{fidelity_score}}. APPROVE with your finish action (merge/pr/keep) or DENY to discard.

        Choose your finish action:
        - **APPROVE** with message **merge** — merge to main (or default) branch
        - **APPROVE** with message **pr** — open a pull request
        - **APPROVE** with message **keep** — keep on current branch, no merge
        - **DENY** — discard artifact, do not ship

  # ==========================================================================
  # STAGE 3: FINISH ARTIFACT
  # Execute the chosen finish action and produce delivery report
  # Standalone equivalent: zerovector:recipes/finish-artifact.yaml
  # ==========================================================================
  - name: "finish-artifact"
    steps:
      - id: "parse-finish-action"
        type: "bash"
        command: |
          ACTION=$(echo "{{_approval_message}}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
          case "$ACTION" in
            merge|pr|keep) ;;
            *) ACTION="keep" ;;
          esac
          echo "{\"action\": \"$ACTION\"}"
        parse_json: true
        output: "finish_action"

      - id: "execute-finish"
        agent: "zerovector:shipper"
        prompt: |
          Execute this finish action for the validated artifact.

          Finish Action: {{finish_action.action}}

          Action semantics:
          - merge: clean commit history → merge current branch into main (or default branch)
          - pr:    clean commit history → open a pull request with conventional title + description
          - keep:  commit cleanly on current branch; no merge, no PR
          - discard: this should not reach here; if it does, stop and report

          Convergence Report:
          {{convergence_report}}

          Intent Document:
          {{intent_document}}

          Specification:
          {{approved_spec}}

          Domain: {{domain}}
          Project path: {{project_path}}

          Use your Delivery Report output format. Include the finish action taken.
        output: "delivery_report"

      - id: "pipeline-summary"
        type: "bash"
        command: |
          echo "============================================"
          echo "  ZERO-VECTOR PIPELINE COMPLETE (v0.3)"
          echo "============================================"
          echo ""
          echo "Intent:  {{intent}}"
          echo "Domain:  {{domain}}"
          echo "Action:  {{finish_action.action}}"
          echo "Fidelity score: {{fidelity_score}} / {{target_fidelity}} target"
          echo ""
          echo "Pipeline artifacts:"
          echo "  Intent: {{paths.intent_path}}"
          echo "  Spec:   {{paths.spec_path}}"
          echo ""
          echo "{{delivery_report}}"
          echo ""
          echo "============================================"
        output: "final_output"
